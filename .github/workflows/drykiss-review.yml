# DRYKISS PR Review — GitHub Actions Workflow Template
#
# Copy this file into your repository at .github/workflows/drykiss-review.yml
# and adjust the environment variables to match your setup.
#
# Requirements:
#   - pi CLI installed in your CI environment (see Install step below)
#   - ANTHROPIC_API_KEY or equivalent LLM provider key set as a repository secret
#   - GITHUB_TOKEN is provided automatically by GitHub Actions
#
# The workflow runs drykiss_autoreview in mode=pr and optionally posts the
# findings back to the PR as an inline GitHub review.

name: DRYKISS Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write  # needed to post review comments

jobs:
  review:
    name: DRYKISS Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history so git diff works correctly across branches
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '>=18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install pi CLI
        run: npm install -g @earendil-works/pi-coding-agent
        # If pi is not available via npm, refer to the Pi installation docs.
        # You can also pin to a specific version: @earendil-works/pi-coding-agent@0.80.8

      - name: Install pi-drykiss extension
        run: pi install npm:pi-drykiss
        # Alternatively, if you are testing a local version:
        # run: pi install .

      - name: Run DRYKISS PR review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set your LLM provider API key as a repository secret:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: set a quality gate — the workflow fails if score < threshold
          DRYKISS_QUALITY_GATE: '60'
          # Set to 'true' to post findings as inline PR review comments
          DRYKISS_POST_TO_PR: 'true'
          # Comma-separated lenses to run (omit to run all)
          # DRYKISS_LENSES: 'security,resilience'
        run: |
          node scripts/ci-review.js \
            --pr "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}"
